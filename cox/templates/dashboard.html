<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>coxswain</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#2a3140;
    --fg:#e6edf3; --dim:#8b949e; --accent:#3b82f6;
    --ok:#3fb950; --warn:#d29922; --bad:#f85149; --idle:#6e7681;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { position:sticky; top:0; z-index:5; background:var(--bg);
    border-bottom:1px solid var(--line); padding:12px 16px calc(12px + env(safe-area-inset-bottom,0));
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  h1 { font-size:16px; margin:0; letter-spacing:.3px; }
  h1 .dot { color:var(--accent); }
  .spacer { flex:1; }
  .pill { font-size:12px; color:var(--dim); background:var(--panel2);
    border:1px solid var(--line); border-radius:999px; padding:3px 10px; }
  .pill b { color:var(--fg); }
  .warnpill { color:var(--warn); border-color:#3d2f12; }
  #burn { display:inline-flex; gap:6px; flex-wrap:wrap; }
  .burnpill { color:var(--dim); } .burnpill b { color:#6cb6ff; }
  .stale { color:var(--warn); }
  .crit { color:var(--ok); } .crit.bad { color:var(--bad); }
  .ctx { color:var(--dim); } .ctx.bad { color:var(--warn); }
  .card.stalled { border-color:#3d2f12; }
  button { font:inherit; cursor:pointer; border:1px solid var(--line);
    background:var(--panel2); color:var(--fg); border-radius:8px; padding:6px 12px; }
  button:active { transform:translateY(1px); }
  button.warn { border-color:#3d2f12; color:var(--warn); }
  button.stop { border-color:#4a1d1d; color:var(--bad); }
  button.approve { border-color:#12331f; color:var(--ok); }
  .view-btn { font-size:12px; padding:4px 9px; text-transform:capitalize; }
  .view-btn.on { border-color:var(--accent); color:#6cb6ff; }
  main { padding:16px; display:grid; gap:12px; max-width:820px; margin:0 auto; }
  .alert { border:1px solid #4a1d1d; background:#1a1113;
    border-radius:10px; padding:10px 14px; color:var(--warn); font-size:13px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:14px; }
  .card.needs { border-color:#5a4310; }
  .row { display:flex; align-items:center; gap:10px; }
  .badge { font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px;
    text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; }
  .b-work { background:#10233b; color:#6cb6ff; }
  .b-ok { background:#0f2417; color:var(--ok); }
  .b-bad { background:#2b1213; color:var(--bad); }
  .b-warn { background:#2a2110; color:var(--warn); }
  .b-idle { background:var(--panel2); color:var(--idle); }
  .tid { font-weight:600; word-break:break-all; }
  .meta { color:var(--dim); font-size:12px; margin-top:2px; }
  .last { color:var(--fg); font-size:13px; margin-top:8px; opacity:.9; }
  /* pipeline stepper: Code → Gate → Review → PR → Merged */
  .pipe { display:flex; align-items:flex-start; margin-top:12px; overflow-x:auto; }
  .step { display:flex; flex-direction:column; align-items:center; gap:4px; flex:0 0 auto; }
  .step .ic { width:26px; height:26px; border-radius:50%; display:flex;
    align-items:center; justify-content:center; font-size:13px; line-height:1;
    border:1px solid var(--line); background:var(--panel2); color:var(--idle);
    transition:all .3s; }
  .step .lb { font-size:10px; color:var(--idle); text-transform:uppercase;
    letter-spacing:.3px; white-space:nowrap; }
  .step.done .ic { background:#0f2417; border-color:var(--ok); color:var(--ok); }
  .step.done .lb { color:var(--ok); }
  .step.active .ic { border-color:var(--accent); color:#6cb6ff; background:#10233b;
    animation:pulse 1.5s ease-out infinite; }
  .step.active .lb { color:#6cb6ff; }
  .step.error .ic { border-color:var(--bad); color:var(--bad); background:#2b1213; }
  .step.error .lb { color:var(--bad); }
  .seg { flex:1 1 auto; height:2px; min-width:10px; background:var(--line);
    margin-top:13px; }
  .seg.filled { background:var(--ok); }
  @keyframes pulse { 0%{ box-shadow:0 0 0 0 rgba(59,130,246,.55);}
    70%,100%{ box-shadow:0 0 0 6px rgba(59,130,246,0);} }
  .feed { margin-top:10px; border-top:1px solid var(--line); padding-top:10px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12.5px;
    color:var(--dim); white-space:pre-wrap; word-break:break-word; display:none; }
  .feed.open { display:block; }
  .feed .t { color:#6cb6ff; } .feed .n { color:var(--fg); } .feed .d { color:var(--ok); }
  .actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  a { color:var(--accent); }
  .empty { color:var(--dim); text-align:center; padding:40px 0; }
  .off { color:var(--bad); }
  #trend { border-bottom:1px solid var(--line); background:var(--panel); padding:12px 16px;
    display:flex; gap:22px; flex-wrap:wrap; align-items:center; }
  .tstat { font-size:13px; color:var(--dim); display:flex; align-items:center; gap:8px; }
  .tstat b { color:var(--fg); } .tstat b.bad { color:var(--bad); }
  .tstat .dim { color:var(--dim); }
  #dispatch { border-bottom:1px solid var(--line); background:var(--panel); }
  .dform { max-width:820px; margin:0 auto; padding:14px 16px; display:grid; gap:8px; }
  .dform input, .dform textarea, .dform select {
    font:inherit; background:var(--bg); color:var(--fg); border:1px solid var(--line);
    border-radius:8px; padding:8px 10px; width:100%; }
  .dform textarea { resize:vertical; font-family:inherit; }
  .drow { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .drow select { flex:1; min-width:120px; } .drow input { flex:1; min-width:120px; }
  #d-effort { flex:0 0 auto; min-width:0; width:auto; }
  #d-issue-list { width:100%; }
  #d-go { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
  .slot { font-size:11px; font-weight:600; color:var(--fg); text-transform:uppercase;
    letter-spacing:.4px; margin-top:4px; }
  .slot-note { font-weight:400; text-transform:none; letter-spacing:0; color:var(--dim); }
  .chk { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--dim);
    flex:0 0 auto; white-space:nowrap; }
  .dmsg { font-size:13px; color:var(--dim); min-height:18px; }
  .dmsg.ok { color:var(--ok); } .dmsg.err { color:var(--bad); }
</style>
</head>
<body>
<header>
  <h1><span class="dot">▟</span> coxswain</h1>
  <span class="pill" id="p-needs">needs you <b>0</b></span>
  <span class="pill" id="p-active">running <b>0</b></span>
  <span class="pill warnpill" id="p-stalled" hidden>⚠ stalled <b>0</b></span>
  <span class="pill" id="p-cost">$<b>0.00</b></span>
  <span id="burn"></span>
  <span class="spacer"></span>
  <span id="conn" class="pill">connecting…</span>
  <button id="new-btn">＋ Dispatch</button>
  <button id="trend-btn" title="cycle-time &amp; fix-round trend">📈</button>
  <button id="pause" class="warn">Pause</button>
</header>
<section id="trend" hidden></section>
<section id="dispatch" hidden>
  <div class="dform">
    <div class="drow">
      <select id="d-repo"><option value="">— pick a repo —</option></select>
      <button id="d-repo-refresh" title="rescan clone-root">⟳</button>
    </div>
    <div class="drow">
      <input id="d-repo-add" placeholder="＋ clone a git URL, or add a local path">
      <button id="d-repo-go">Add</button>
    </div>
    <div id="d-repo-msg" class="dmsg"></div>
    <div class="drow">
      <input id="d-issue" placeholder="GitHub issue URL or # (auto-fills title + details)">
      <button id="d-load">📋 List issues</button>
    </div>
    <select id="d-issue-list" hidden></select>
    <input id="d-title" placeholder="task title (blank = use the issue title)">
    <textarea id="d-body" rows="3" placeholder="task details (blank = use the issue body)"></textarea>
    <textarea id="d-acceptance" rows="2" placeholder="acceptance criteria — one per line (blank = derive from the plan)"></textarea>
    <div class="slot">plan <span class="slot-note">· architect drafts plan.md first (optional)</span></div>
    <div class="drow">
      <select id="d-plan-lane"><option value="">none · skip planning</option><option value="claude">claude</option><option value="codex">codex</option></select>
      <select id="d-plan-model" hidden></select>
      <select id="d-plan-effort" hidden></select>
      <label id="d-plan-approve-l" class="chk" hidden><input type="checkbox" id="d-plan-approve"> approve first</label>
    </div>
    <div class="slot">implement <span class="slot-note">· fix rounds reuse this</span></div>
    <div class="drow">
      <select id="d-lane"><option value="claude">claude</option><option value="codex">codex</option></select>
      <select id="d-model"></select>
      <select id="d-effort" title="reasoning effort"></select>
    </div>
    <div class="slot">review <span class="slot-note">· stateless — fresh eyes on the diff</span></div>
    <div class="drow">
      <select id="d-review-lane"><option value="">default · opus</option><option value="claude">claude</option><option value="codex">codex</option></select>
      <select id="d-review-model" hidden></select>
      <select id="d-review-effort" hidden></select>
      <button id="d-go">Dispatch</button>
    </div>
    <div id="d-msg" class="dmsg"></div>
  </div>
</section>
<main id="board"><div class="empty">Loading…</div></main>
<script>
const TOKEN = "__TOKEN__";
const CATALOG = __CATALOG__;
const q = (p) => p + (p.includes("?") ? "&" : "?") + "t=" + encodeURIComponent(TOKEN);
const VIEWS = ["feed","diff","plan","checklist","findings","evidence"];

// model + effort dropdowns, driven by the per-lane CATALOG
const EFF_LABEL = {low:"low", medium:"med", high:"high"};
function fillEfforts(lane, modelSel, effSel){
  const m = (CATALOG[lane]||[]).find(x=>x.model===modelSel.value) || {efforts:["low","medium","high"]};
  effSel.innerHTML = m.efforts.map(e =>
    '<option value="'+e+'"'+(e==="medium"?" selected":"")+'>'+(EFF_LABEL[e]||e)+'</option>').join("");
}
function fillModels(lane, modelSel, effSel){
  const items = CATALOG[lane]||[];
  modelSel.innerHTML = items.map(m =>
    '<option value="'+m.model+'"'+(m.default?" selected":"")+'>'+esc(m.label)+'</option>').join("");
  fillEfforts(lane, modelSel, effSel);
}

const BADGE = {
  planning:["b-work","planning"],
  working:["b-work","working"], gating:["b-work","gating"], fixing:["b-work","fixing"],
  pr_open:["b-warn","pr open"], needs_human:["b-warn","needs you"],
  landed:["b-ok","landed"], failed:["b-bad","failed"], queued:["b-idle","queued"],
};
const esc = (s) => (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const fmtTok = (n) => n>=1e6 ? (n/1e6).toFixed(1)+"M" : n>=1e3 ? (n/1e3).toFixed(n>=1e4?0:1)+"k" : ""+n;

// pipeline stepper: Code → Gate → Review → PR → Merged, lit to the task's stage
let STAGES = ["Code","Gate","Review","PR","Merged"];
const STAGE_ICONS = ["⌨️","🧪","🔍","🚀","🎉"];
function pipeHTML(st){
  if(!st) return "";
  const i = st.i, status = st.status;
  let h = '<div class="pipe">';
  for(let k=0;k<STAGES.length;k++){
    let cls, ic;
    if(k < i){ cls="done"; ic="✓"; }
    else if(k===i){
      if(status==="done"){ cls="done"; ic = (k===STAGES.length-1?"🎉":"✓"); }
      else if(status==="error"){ cls="error"; ic="✕"; }
      else { cls="active"; ic=STAGE_ICONS[k]; }
    } else { cls="pending"; ic=STAGE_ICONS[k]; }
    let lb = STAGES[k];
    if(k===2 && st.fix_rounds>0) lb += " 🔁"+st.fix_rounds;
    h += '<div class="step '+cls+'"><span class="ic">'+ic+'</span>'
       + '<span class="lb">'+esc(lb)+'</span></div>';
    if(k<STAGES.length-1) h += '<span class="seg'+(k<i?' filled':'')+'"></span>';
  }
  return h + '</div>';
}
function feedHTML(lines){
  return lines.map(l => {
    const c = l.startsWith("→")?"t":l.startsWith("■")?"d":"n";
    return '<span class="'+c+'">'+esc(l)+'</span>';
  }).join("\n");
}

// one drill-in panel per card showing a chosen view: feed | diff | plan | evidence
const view = new Map();  // id -> kind (absent = closed)
async function loadView(id, el, kind){
  if(kind === "feed"){
    const d = await (await fetch(q("/api/task/"+id+"/feed"))).json();
    el.innerHTML = feedHTML(d.feed || []);
  } else {
    el.textContent = "loading "+kind+"…";
    const d = await (await fetch(q("/api/task/"+id+"/artifact?kind="+kind))).json();
    el.textContent = d.text || d.error || "(empty)";
  }
}
function refreshOpen(){  // only the live feed needs re-polling; artifacts are snapshots
  for(const [id, kind] of view){
    if(kind !== "feed") continue;
    const el = document.querySelector('.card[data-id="'+CSS.escape(id)+'"] .feed');
    if(el) loadView(id, el, "feed");
  }
}

let lastSig = null;
function render(s){
  if(s.stages) STAGES = s.stages;
  document.querySelector("#p-needs b").textContent = s.needs_you;
  document.querySelector("#p-active b").textContent = s.active;
  const stp = document.getElementById("p-stalled");
  stp.hidden = !s.stalled; stp.querySelector("b").textContent = s.stalled || 0;
  const burn = s.burn || {}, wh = s.burn_window_h || 5;
  document.getElementById("burn").innerHTML = Object.keys(burn).sort().map(lane => {
    const b = burn[lane];
    const c = b.priced && b.cost ? " · $"+b.cost.toFixed(2) : "";
    return '<span class="pill burnpill" title="'+lane+' usage in the last '+wh+'h">'+
      esc(lane)+' <b>'+fmtTok(b.tokens)+'</b>'+c+' /'+wh+'h</span>';
  }).join("");
  document.querySelector("#p-cost b").textContent =
    s.total_cost_usd==null ? "?" : s.total_cost_usd.toFixed(2);
  const pauseBtn = document.getElementById("pause");
  pauseBtn.textContent = s.paused ? "Resume" : "Pause";
  pauseBtn.className = s.paused ? "stop" : "warn";

  // Only rebuild the board when something visible actually changed — else the
  // 2s SSE tick would nuke open feeds and scroll. When unchanged, just refresh
  // any open feeds (the thing you're actively watching).
  const sig = JSON.stringify(s.paused) + "|" + JSON.stringify(
    s.tasks.map(t => [t.id, t.state, t.reason, t.cost_usd, t.last_status, t.pr_url, t.active, t.stale,
      t.criteria, t.ctx_pct, t.stage && [t.stage.i, t.stage.status, t.stage.fix_rounds]]));
  if(sig === lastSig){ refreshOpen(); return; }
  lastSig = sig;

  const board = document.getElementById("board");
  if(!s.tasks.length){ board.innerHTML = '<div class="empty">No tasks yet. Dispatch one from the CLI.</div>'; return; }
  let html = "";
  if(s.paused) html += '<div class="alert alert-pause">⏸ Dispatch &amp; ship are PAUSED.</div>';
  for(const t of s.tasks){
    const [cls,label] = BADGE[t.state] || ["b-idle", t.state];
    const cost = t.cost_usd==null ? "" : " · $"+t.cost_usd.toFixed(2);
    const rev = (t.review && t.review!=="default") ? " · review "+esc(t.review) : "";
    const pl = t.plan ? " · plan "+esc(t.plan) : "";
    const pr = t.pr_url ? ' · <a href="'+t.pr_url+'" target="_blank">PR</a>' : "";
    const stale = t.stale ? ' · <span class="stale">⚠ stalled '+Math.round(t.idle_secs/60)+'m</span>' : "";
    const crit = t.criteria ? ' · <span class="crit'+(t.criteria.failed?' bad':'')+'">'+
      (t.criteria.failed ? ('⚠ '+t.criteria.failed+' failed') : ('✓ '+t.criteria.passed+'/'+t.criteria.total))+'</span>' : "";
    const ctx = (t.ctx_pct!=null) ? ' · <span class="ctx'+(t.ctx_pct>=70?' bad':'')+'">ctx '+t.ctx_pct+'%</span>' : "";
    const needsPlan = t.state==="needs_human" && t.reason==="plan-review";
    html += '<div class="card'+(t.needs_you?' needs':'')+(t.stale?' stalled':'')+'" data-id="'+esc(t.id)+'">'
      + '<div class="row"><span class="badge '+cls+'">'+label+'</span>'
      + '<span class="tid">'+esc(t.id)+'</span></div>'
      + '<div class="meta">'+esc(t.lane)+'/'+esc(t.model)+pl+rev+cost+crit+ctx+stale+pr+'</div>'
      + pipeHTML(t.stage)
      + (t.last_status ? '<div class="last">'+esc(t.last_status)+'</div>' : '')
      + '<div class="actions">'
      +   VIEWS.map(v => '<button class="view-btn" data-kind="'+v+'">'+v+'</button>').join('')
      +   (needsPlan ? '<button class="approve approve-btn">Approve plan</button>' : '')
      +   (t.state==="needs_human" ? '<button class="rule-btn" title="capture a lesson so it is not repeated">+ rule</button>' : '')
      +   (t.active ? '<button class="stop stop-btn">Stop</button>' : '')
      + '</div>'
      + '<div class="feed'+(view.has(t.id)?' open':'')+'"></div>'
      + '</div>';
  }
  board.innerHTML = html;
  for(const card of board.querySelectorAll(".card")){
    const id = card.dataset.id, panel = card.querySelector(".feed");
    const paint = () => {
      const cur = view.get(id);
      panel.classList.toggle("open", !!cur);
      card.querySelectorAll(".view-btn").forEach(b =>
        b.classList.toggle("on", b.dataset.kind === cur));
    };
    if(view.has(id)) loadView(id, panel, view.get(id));
    paint();
    card.querySelectorAll(".view-btn").forEach(btn => btn.onclick = () => {
      const kind = btn.dataset.kind;
      if(view.get(id) === kind){ view.delete(id); }
      else { view.set(id, kind); loadView(id, panel, kind); }
      paint();
    });
    const stop = card.querySelector(".stop-btn");
    if(stop) stop.onclick = async () => {
      if(!confirm("Stop "+id+"? This kills the worker.")) return;
      await fetch(q("/api/task/"+id+"/stop"), {method:"POST"});
    };
    const rule = card.querySelector(".rule-btn");
    if(rule) rule.onclick = async () => {
      const text = prompt("New rule for this repo — a one-line lesson the implementer must not repeat:");
      if(!text || !text.trim()) return;
      const d = await (await fetch(q("/api/task/"+id+"/promote-rule"),
        {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({text})})).json();
      rule.textContent = d.added ? "✓ rule ("+d.count+")" : "· dup";
    };
    const appr = card.querySelector(".approve-btn");
    if(appr) appr.onclick = async () => {
      appr.disabled = true;
      await fetch(q("/api/task/"+id+"/approve-plan"), {method:"POST"});
      lastSig = null;  // force a rebuild so it flips to working
    };
  }
}

document.getElementById("pause").onclick = async (e) => {
  const resume = e.target.textContent === "Resume";
  await fetch(q(resume ? "/api/resume" : "/api/pause"), {method:"POST"});
};

// cycle-time + fix-round trend (D1)
function sparkline(vals, color){
  if(!vals.length) return "";
  const w=120, h=22, max=Math.max(...vals,1), min=Math.min(...vals,0), rng=(max-min)||1;
  const pts=vals.map((v,i)=>{const x=vals.length>1?i/(vals.length-1)*w:0;
    return x.toFixed(1)+","+(h-((v-min)/rng)*h).toFixed(1);}).join(" ");
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'"><polyline fill="none" stroke="'+
    color+'" stroke-width="1.5" points="'+pts+'"/></svg>';
}
const mins = (s) => s>=60 ? (s/60).toFixed(s>=600?0:1)+"m" : s+"s";
async function loadTrend(){
  const el = document.getElementById("trend");
  const d = await (await fetch(q("/api/history"))).json();
  el.innerHTML = d.count ?
    '<div class="tstat">landed <b>'+d.count+'</b></div>'+
    '<div class="tstat">median cycle <b>'+mins(d.median_cycle_secs)+'</b>'+sparkline(d.cycles,"#6cb6ff")+'</div>'+
    '<div class="tstat">fix rounds/task <b'+(d.fix_rounds_rising?' class="bad"':'')+'>'+d.avg_fix_rounds+
      (d.fix_rounds_rising?" ↑ rising":"")+'</b>'+sparkline(d.fixes,d.fix_rounds_rising?"#f85149":"#3fb950")+'</div>'
    : '<span class="dim">no landed tasks yet</span>';
}
document.getElementById("trend-btn").onclick = () => {
  const s = document.getElementById("trend");
  s.hidden = !s.hidden;
  if(!s.hidden) loadTrend();
};

// dispatch-from-UI (manual captain dispatch)
const dpanel = document.getElementById("dispatch");
document.getElementById("new-btn").onclick = () => {
  dpanel.hidden = !dpanel.hidden;
  if(!dpanel.hidden){ loadRepos(); document.getElementById("d-title").focus(); }
};

// implement + review model/effort dropdowns (CATALOG-driven)
const dLane = document.getElementById("d-lane");
const dModel = document.getElementById("d-model");
const dEffort = document.getElementById("d-effort");
const rLane = document.getElementById("d-review-lane");
const rModel = document.getElementById("d-review-model");
const rEffort = document.getElementById("d-review-effort");
fillModels(dLane.value, dModel, dEffort);
dLane.onchange = () => fillModels(dLane.value, dModel, dEffort);
dModel.onchange = () => fillEfforts(dLane.value, dModel, dEffort);
rLane.onchange = () => {
  const on = !!rLane.value;
  rModel.hidden = rEffort.hidden = !on;
  if(on) fillModels(rLane.value, rModel, rEffort);
};
rModel.onchange = () => fillEfforts(rLane.value, rModel, rEffort);
const pLane = document.getElementById("d-plan-lane");
const pModel = document.getElementById("d-plan-model");
const pEffort = document.getElementById("d-plan-effort");
const pApproveL = document.getElementById("d-plan-approve-l");
pLane.onchange = () => {
  const on = !!pLane.value;
  pModel.hidden = pEffort.hidden = pApproveL.hidden = !on;
  if(on) fillModels(pLane.value, pModel, pEffort);
};
pModel.onchange = () => fillEfforts(pLane.value, pModel, pEffort);

// repo picker: dropdown of repos in the clone-root + add/clone
const repoSel = document.getElementById("d-repo");
async function loadRepos(keep){
  try {
    const r = await fetch(q("/api/repos"));
    const d = await r.json();
    const want = keep || repoSel.value;
    repoSel.innerHTML = '<option value="">— pick a repo —</option>' +
      (d.repos||[]).map(x => '<option value="'+esc(x.path)+'">'+esc(x.name)+
        (x.trusted?"":" ⚠ untrusted")+'</option>').join("");
    if(want) repoSel.value = want;
  } catch(e){ /* leave the placeholder */ }
}
const repoMsg = document.getElementById("d-repo-msg");
document.getElementById("d-repo-refresh").onclick = () => loadRepos();
document.getElementById("d-repo-go").onclick = async () => {
  const ref = document.getElementById("d-repo-add").value.trim();
  if(!ref){ repoMsg.textContent="paste a git URL or a local path"; repoMsg.className="dmsg err"; return; }
  repoMsg.textContent = "resolving…"; repoMsg.className = "dmsg";
  try {
    const r = await fetch(q("/api/repos/add"), {method:"POST",
      headers:{"Content-Type":"application/json"}, body:JSON.stringify({ref})});
    const d = await r.json();
    if(d.error){ repoMsg.textContent="✗ "+d.error; repoMsg.className="dmsg err"; return; }
    await loadRepos(d.path);
    document.getElementById("d-repo-add").value = "";
    if(d.needs_trust){
      repoMsg.innerHTML = (d.cloned?"cloned ":"")+esc(d.name)+
        " — new repo, review it then <button id='d-trust'>Trust &amp; use</button>";
      repoMsg.className = "dmsg";
      document.getElementById("d-trust").onclick = async () => {
        await fetch(q("/api/repos/trust"), {method:"POST",
          headers:{"Content-Type":"application/json"}, body:JSON.stringify({path:d.path})});
        await loadRepos(d.path);
        repoMsg.textContent = "✓ trusted "+d.name; repoMsg.className = "dmsg ok";
      };
    } else {
      repoMsg.textContent = "✓ "+d.name+" ready"; repoMsg.className = "dmsg ok";
    }
  } catch(e){ repoMsg.textContent="✗ "+e; repoMsg.className="dmsg err"; }
};

// load open issues for the repo into the picker
const issueSel = document.getElementById("d-issue-list");
document.getElementById("d-load").onclick = async () => {
  const msg = document.getElementById("d-msg");
  const repo = document.getElementById("d-repo").value.trim();
  msg.textContent = "loading issues…"; msg.className = "dmsg";
  try {
    const r = await fetch(q("/api/issues") + "&repo=" + encodeURIComponent(repo));
    const d = await r.json();
    if(d.error){ msg.textContent="✗ "+d.error; msg.className="dmsg err"; return; }
    if(!d.issues.length){ msg.textContent="no open issues"; msg.className="dmsg"; issueSel.hidden=true; return; }
    issueSel.innerHTML = '<option value="">— pick an issue (' + d.issues.length + ') —</option>' +
      d.issues.map(i => '<option value="'+esc(i.url)+'">#'+i.number+' '+esc(i.title)+'</option>').join("");
    issueSel.hidden = false; msg.textContent = "";
  } catch(e){ msg.textContent="✗ "+e; msg.className="dmsg err"; }
};
issueSel.onchange = () => { if(issueSel.value) document.getElementById("d-issue").value = issueSel.value; };

document.getElementById("d-go").onclick = async () => {
  const msg = document.getElementById("d-msg");
  const body = {
    repo: document.getElementById("d-repo").value.trim(),
    issue: document.getElementById("d-issue").value.trim(),
    title: document.getElementById("d-title").value.trim(),
    body: document.getElementById("d-body").value.trim(),
    lane: dLane.value,
    model: dModel.value + ":" + dEffort.value,
    review_lane: rLane.value,
    review_model: rLane.value ? (rModel.value + ":" + rEffort.value) : "",
    plan_lane: pLane.value,
    plan_model: pLane.value ? (pModel.value + ":" + pEffort.value) : "",
    plan_approval: pLane.value && document.getElementById("d-plan-approve").checked,
    acceptance: document.getElementById("d-acceptance").value,
  };
  if(!body.repo || (!body.title && !body.issue)){ msg.textContent="need a repo and a title or issue"; msg.className="dmsg err"; return; }
  msg.textContent="dispatching…"; msg.className="dmsg";
  try {
    const r = await fetch(q("/api/dispatch"), {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
    const d = await r.json();
    if(d.error){ msg.textContent="✗ "+d.error; msg.className="dmsg err"; return; }
    msg.textContent="✓ dispatched "+d.id+" on "+d.lane+"/"+d.model+
      (d.plan?" · plan "+d.plan:"")+
      (d.review&&d.review!=="default"?" · review "+d.review:""); msg.className="dmsg ok";
    for(const id of ["d-issue","d-title","d-body","d-acceptance"]) document.getElementById(id).value="";
    issueSel.hidden=true;
    lastSig=null;  // force a board rebuild so the new task appears immediately
  } catch(e){ msg.textContent="✗ "+e; msg.className="dmsg err"; }
};

function connect(){
  const es = new EventSource(q("/events"));
  const conn = document.getElementById("conn");
  es.onopen = () => { conn.textContent = "live"; conn.className = "pill"; };
  es.onmessage = (e) => render(JSON.parse(e.data));
  es.onerror = () => { conn.textContent = "reconnecting…"; conn.className = "pill off"; };
}
// initial paint (in case SSE is slow) + live stream
fetch(q("/api/tasks")).then(r=>r.json()).then(render).catch(()=>{});
connect();
</script>
</body>
</html>
